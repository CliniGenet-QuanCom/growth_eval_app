name: pediatric_growth
description: 小児体格指数計算アプリ（医療従事者向け・オフライン）
publish_to: "none"
version: 1.0.0+3

environment:
  sdk: ">=3.0.0 <4.0.0"
  flutter: ">=3.10.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  fl_chart: ^0.69.0
  intl: ^0.20.2
  provider: ^6.1.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true

  # 日本語字形を全プラットフォームで保証する（Web では未同梱だと
  # 中国語向けフォールバックフォントが使われ簡体字風の字形になる）
  fonts:
    - family: NotoSansJP
      fonts:
        - asset: assets/fonts/NotoSansJP.ttf
